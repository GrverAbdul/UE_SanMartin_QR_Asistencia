<!--apps/permisos/templates/permisos/solicitar.html-->
{% extends 'base.html' %}
{% block content %}
<h2>Solicitar Permiso</h2>

{% if messages %}
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
  {% endfor %}
{% endif %}

<form method="post" enctype="multipart/form-data" class="row g-3">
  {% csrf_token %}

  <div class="col-md-6">
    <label for="fecha_inicio" class="form-label">Fecha de inicio</label>
    <input type="datetime-local" name="fecha_inicio" id="fecha_inicio" class="form-control" required>
  </div>

  <div class="col-md-6">
    <label for="fecha_fin" class="form-label">Fecha de fin</label>
    <input type="datetime-local" name="fecha_fin" id="fecha_fin" class="form-control" required>
  </div>

  <div class="col-md-6">
    <label for="tipo_permiso" class="form-label">Tipo de permiso</label>
    <select name="tipo_permiso" id="tipo_permiso" class="form-select" required>
      <option value="">Seleccione...</option>
      <option value="estudio">Estudio</option>
      <option value="salud">Salud</option>
      <option value="personal">Personal</option>
      <option value="otro">Otro</option>
    </select>
  </div>

  <div class="col-12">
    <label for="motivo" class="form-label">Motivo</label>
    <textarea name="motivo" id="motivo" rows="4" class="form-control" required></textarea>
  </div>

  <div class="col-12">
    <label for="archivo" class="form-label">Adjuntar justificante (opcional)</label>
    <input type="file" name="archivo" id="archivo" class="form-control">
  </div>

  <div class="col-12">
    <button type="submit" class="btn btn-primary">Enviar solicitud</button>
    <a href="{% url 'lista_permisos' %}" class="btn btn-secondary">Cancelar</a>
  </div>
</form>
{% endblock %}
