<!--apps/usuarios/templates/usuarios/password_change.html-->
{% extends 'base.html' %}
{% block content %}
<h2>Cambiar contraseña</h2>
<p>Por razones de seguridad, ingrese su contraseña actual y luego la nueva contraseña dos veces.</p>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Cambiar mi contraseña</button>
</form>
{% endblock %}
