<!--templates/dashboard/admin.html-->
{% extends 'base.html' %}
{% block content %}
<h2>Panel de Administración</h2>
<p>Bienvenido, {{ user.get_full_name }}.</p>

<div class="row mt-4">
    <div class="col-md-4">
        <div class="card text-white bg-primary mb-3">
            <div class="card-header"><i class="bi bi-person-check"></i> Asistencias Hoy</div>
            <div class="card-body">
                <h5 class="card-title">158</h5>
                <p class="card-text">Marcaciones registradas</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-warning mb-3">
            <div class="card-header"><i class="bi bi-hourglass-split"></i> Permisos Pendientes</div>
            <div class="card-body">
                <h5 class="card-title">7</h5>
                <p class="card-text">Solicitudes sin revisar</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-danger mb-3">
            <div class="card-header"><i class="bi bi-exclamation-triangle"></i> Faltas Críticas</div>
            <div class="card-body">
                <h5 class="card-title">12</h5>
                <p class="card-text">Estudiantes con más de 3 faltas</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
