<!--templates/dashboard/directivo.html-->
{% extends 'base.html' %}
{% block content %}
<h2>Panel del Directivo</h2>
<p>Bienvenido, {{ user.get_full_name }}.</p>

<div class="row mt-4">
    <div class="col-md-4">
        <a href="{% url 'generar_reporte' %}" class="text-decoration-none">
            <div class="card text-white bg-primary mb-3">
                <div class="card-header"><i class="bi bi-building"></i> Institución</div>
                <div class="card-body">
                    <h5 class="card-title">UE San Martín</h5>
                    <p class="card-text">Gestión de asistencia</p>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="{% url 'generar_reporte' %}" class="text-decoration-none">
            <div class="card text-white bg-success mb-3">
                <div class="card-header"><i class="bi bi-graph-up"></i> Reportes</div>
                <div class="card-body">
                    <h5 class="card-title">Generar</h5>
                    <p class="card-text">Visualice reportes institucionales.</p>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-info mb-3">
            <div class="card-header"><i class="bi bi-person-badge"></i> Personal</div>
            <div class="card-body">
                <h5 class="card-title">{{ total_personal }}</h5>
                <p class="card-text">Total docentes y administrativos</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
