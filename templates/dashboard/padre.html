<!--templates/dashboard/padre.html-->
{% extends 'base.html' %}
{% block content %}
<h2>Panel de Padre de Familia</h2>
<p>Bienvenido, {{ user.get_full_name }}.</p>

<div class="row mt-4">
    <div class="col-md-6">
        <a href="{% url 'historial_asistencia' %}" class="text-decoration-none">
            <div class="card text-white bg-success mb-3">
                <div class="card-header"><i class="bi bi-people"></i> Mis Hijos</div>
                <div class="card-body">
                    <h5 class="card-title">{{ hijos_count }}</h5>
                    <p class="card-text">Estudiantes asociados</p>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-6">
        <a href="{% url 'lista_notificaciones' %}" class="text-decoration-none">
            <div class="card text-white bg-warning mb-3">
                <div class="card-header"><i class="bi bi-bell"></i> Notificaciones</div>
                <div class="card-body">
                    <h5 class="card-title">{{ notificaciones_no_leidas }}</h5>
                    <p class="card-text">Alertas sin leer</p>
                </div>
            </div>
        </a>
    </div>
</div>
{% endblock %}
