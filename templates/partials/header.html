<!--templates/partials/header.html-->
<header class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">UE San Martín - Control de Asistencia</span>
        {% if user.is_authenticated %}
            <div class="d-flex">
                <span class="text-white me-3">{{ user.get_full_name }} ({{ user.get_rol_display }})</span>
                <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Cerrar sesión</a>
            </div>
        {% endif %}
    </div>
</header>
